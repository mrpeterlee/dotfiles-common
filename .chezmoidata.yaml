# Base dotfiles data. Org-specific values live in the per-overlay
# .chezmoidata/overlay.yaml (see docs/overlay-convention.md).
#
# The `vault` variable is intentionally absent here — .files base
# templates MUST NOT resolve `op://{{ .vault }}/...` URIs, because
# `.vault` is only defined by the overlay that an organization
# contributes. If a base template references `.vault`, chezmoi will
# fail with "<vault>: undefined" — that's the design.
