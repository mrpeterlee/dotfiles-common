name: Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  no-org-plaintext:
    name: No org-specific plaintext
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run plaintext gate
        run: ./tests/hygiene/test_no_org_plaintext.sh

  render-matrix:
    name: Chezmoi render (${{ matrix.os }})
    needs: no-org-plaintext
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        shell: bash
        run: |
          mkdir -p "$HOME/bin"
          curl -fsLS get.chezmoi.io | sh -s -- -b "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/chezmoi" --version
      - name: Render templates
        shell: bash
        run: |
          mkdir -p /tmp/render
          # Seed chezmoi's prompted data with CI fixtures so apply/init
          # doesn't block on interactive prompts. OS flags (isLinux /
          # isDarwin / isWindows / isWSL / pkgmgr / osid / arch) are
          # derived by the toml template from chezmoi's own runtime
          # detection — we only pre-supply the four prompted fields.
          chezmoi init --source=. --apply=false --force \
            --promptString email=ci@example.com \
            --promptString name="CI Runner" \
            --promptString hostname=ci-runner \
            --promptBool personal=false
          chezmoi apply --dry-run --source=. --destination=/tmp/dryrun 2>&1 | tee /tmp/render/apply.log
          test "$(grep -c '^Error:' /tmp/render/apply.log)" = "0"
