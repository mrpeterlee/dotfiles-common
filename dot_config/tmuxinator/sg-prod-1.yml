          #       - lazydocker:
          #         - docker run --rm -it -v /var/run/docker.sock:/var/run/docker.sock -v /home/peter/.config/lazydocker:/.config/jesseduffield/lazydocker lazyteam/lazydocker
          #       - cpu_temperature:
          #         - watch -n 10 -d sensors

  - background:
      layout: tiled
      panes:
        - backgrounds-tasks1:
            - cd
            ## - cd /lab/paper/finclab && git pull
            ## - cd /lab/paper/datalab && git pull
            ## - cd /lab/paper/ts && git pull
            ## - cd /lab/paper/winclient && git pull
