name: sg-prod-1
root: ~/acap
startup_pane: 1

windows:
  - ACap-1:
      layout: even-horizontal
      panes:
        - acap-1:
            - cd ~/acap
            - curl "wttr.in/singapore?m&lang=zh-cn"

  - ACap-2:
      layout: even-horizontal
      panes:
        - acap-2:
            - cd ~/acap

  - ACap-3:
      layout: even-horizontal
      panes:
        - acap-3:
            - cd ~/acap

  - ACap-A(SG):
      layout: even-horizontal
      panes:
        - acap_cc_1:
            - mkdir -p /tmp/claude_telegram_sessions/acap_cc_1
            - ensure_file() { local dst="$1" src="$2"; if [[ ! -f "$dst" ]]; then cp "$src" "$dst"; fi }
            - ensure_file /tmp/claude_telegram_sessions/acap_cc_1/access.json ~/.claude/channels/telegram/access.json
            - export TELEGRAM_BOT_TOKEN="$(op read 'op://ACap/Telegram Bot - acap_cc1_bot/credential')"
            - export TELEGRAM_STATE_DIR="/tmp/claude_telegram_sessions/acap_cc_1"
            - sleep 1 && export BW_SESSION=$(bw unlock "$(op read 'op://Tapai/Bitwarden/password')" --raw)
            - cd ~/acap
            - claude --worktree acap_cc_1 --channels plugin:telegram@claude-plugins-official --dangerously-skip-permissions

        - acap_cc_2:
            - sleep 28
            - mkdir -p /tmp/claude_telegram_sessions/acap_cc_2
            - ensure_file() { local dst="$1" src="$2"; if [[ ! -f "$dst" ]]; then cp "$src" "$dst"; fi }
            - ensure_file /tmp/claude_telegram_sessions/acap_cc_2/access.json ~/.claude/channels/telegram/access.json
            - export TELEGRAM_BOT_TOKEN="$(op read 'op://ACap/Telegram Bot - acap_cc2_bot/credential')"
            - export TELEGRAM_STATE_DIR="/tmp/claude_telegram_sessions/acap_cc_2"
            - sleep 1 && export BW_SESSION=$(bw unlock "$(op read 'op://Tapai/Bitwarden/password')" --raw)
            - cd ~/acap
            - claude --worktree acap_cc_2 --channels plugin:telegram@claude-plugins-official --dangerously-skip-permissions

  - Acap-B(EC2):
      layout: even-horizontal
      panes:
        - acap_cc_3:
            - ~/.config/tmuxinator/start-remote-cc.sh acap acap_cc_3 acap_cc_3 'op://ACap/Telegram Bot - acap_cc3_bot/credential' acap
        - acap_cc_4:
            - ~/.config/tmuxinator/start-remote-cc.sh acap acap_cc_4 acap_cc_4 'op://ACap/Telegram Bot - acap_cc4_bot/credential' acap 17

  - Alpha-A(SG):
      layout: even-horizontal
      panes:
        - alpha_cc_1:
            - sleep 58
            - mkdir -p /tmp/claude_telegram_sessions/acap_cc_5
            - ensure_file() { local dst="$1" src="$2"; if [[ ! -f "$dst" ]]; then cp "$src" "$dst"; fi }
            - ensure_file /tmp/claude_telegram_sessions/acap_cc_5/access.json ~/.claude/channels/telegram/access.json
            - export TELEGRAM_BOT_TOKEN="$(op read 'op://ACap/Telegram Bot - acap_cc5_bot/credential')"
            - export TELEGRAM_STATE_DIR="/tmp/claude_telegram_sessions/acap_cc_5"
            - sleep 1 && export BW_SESSION=$(bw unlock "$(op read 'op://Tapai/Bitwarden/password')" --raw)
            - cd ~/alpha
            - claude --worktree alpha_cc_1 --channels plugin:telegram@claude-plugins-official --dangerously-skip-permissions

        - alpha_cc_2:
            - sleep 113
            - mkdir -p /tmp/claude_telegram_sessions/acap_cc_6
            - ensure_file() { local dst="$1" src="$2"; if [[ ! -f "$dst" ]]; then cp "$src" "$dst"; fi }
            - ensure_file /tmp/claude_telegram_sessions/acap_cc_6/access.json ~/.claude/channels/telegram/access.json
            - export TELEGRAM_BOT_TOKEN="$(op read 'op://ACap/Telegram Bot - acap_cc6_bot/credential')"
            - export TELEGRAM_STATE_DIR="/tmp/claude_telegram_sessions/acap_cc_6"
            - sleep 1 && export BW_SESSION=$(bw unlock "$(op read 'op://Tapai/Bitwarden/password')" --raw)
            - cd ~/alpha
            - claude --worktree alpha_cc_2 --channels plugin:telegram@claude-plugins-official --dangerously-skip-permissions

  - Alpha-B(EC2):
      layout: even-horizontal
      panes:
        - alpha_cc_3:
            - ~/.config/tmuxinator/start-remote-cc.sh acap alpha_cc_3 acap_cc_7 'op://ACap/Telegram Bot - acap_cc7_bot/credential' acap 170

  - Tapai-A(EC2):
      layout: even-horizontal
      panes:
        - tapai_cc_1:
            - ~/.config/tmuxinator/start-remote-cc.sh tapai tapai_cc_1 tapai_cc_1 'op://Tapai/Telegram Bot - tapai_cc1_bot/credential' tapai
        - tapai_cc_2:
            - ~/.config/tmuxinator/start-remote-cc.sh tapai tapai_cc_2 tapai_cc_2 'op://Tapai/Telegram Bot - tapai_cc2_bot/credential' tapai 17

  - Tapai-B(EC2):
      layout: even-horizontal
      panes:
        - tapai_cc_3:
            - ~/.config/tmuxinator/start-remote-cc.sh tapai tapai_cc_3 tapai_cc_3 'op://Tapai/Telegram Bot - tapai_cc3_bot/credential' tapai 39
        - tapai_cc_4:
            - ~/.config/tmuxinator/start-remote-cc.sh tapai tapai_cc_4 tapai_cc_4 'op://Tapai/Telegram Bot - tapai_cc4_bot/credential' tapai 61

  - monitor:
      layout: tiled
      panes:
        - glances:
            - cd
            # Build latest lean
            ## - bash /lab/paper/ts/lean/bin/Build-Custom-Lean
